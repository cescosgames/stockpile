name: Build Electron

on:
  push:
    tags:
      - 'v*'

jobs:
  build-mac:
    runs-on: macos-latest
    env:
      VITE_ELECTRON: true
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - run: npm ci
      - run: tsc -b && vite build && electron-builder
      - uses: actions/upload-artifact@v4
        with:
          name: mac-dmg
          path: dist-electron/*.dmg

  build-win:
    runs-on: windows-latest
    env:
      VITE_ELECTRON: true
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - run: npm ci
      - run: npx tsc -b && npx vite build && npx electron-builder
      - uses: actions/upload-artifact@v4
        with:
          name: win-installer
          path: dist-electron/*.exe
